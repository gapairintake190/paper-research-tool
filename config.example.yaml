# Paper Research Tool - Configuration
# Copy this file to config.yaml and fill in your API keys

# OpenAI API Key (from https://platform.openai.com/api-keys)
openai_api_key: "sk-your-openai-key-here"

# Anthropic API Key (from https://console.anthropic.com/keys)
anthropic_api_key: "sk-ant-your-anthropic-key-here"

# Default AI Provider (openai / anthropic)
default_provider: "openai"

# Output language / 輸出語言 / 출력 언어
# Options: zh-TW (繁體中文) | en (English) | ko (한국어)
language: "zh-TW"

# Knowledge base path (optional)
kb_path: "~/.paper_research/kb"

# Model override (optional)
openai_model: "gpt-4o-mini"
anthropic_model: "claude-3-haiku-20240307"
